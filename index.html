<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Number of acting enterprises as of 31 Dec. 2022 by size of employees and by district (Under 10 people) — 2306060004 Ngô Phương Anh</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height: 100vh; }

.title {
    position: absolute;
    top: 10px;
    left: 50px;
    background: white;
    padding: 10px;
    font-weight: bold;
    z-index: 1000;
}

.legend {
    background: white;
    padding: 10px;
    line-height: 18px;
}

.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="title">
Number of acting enterprises as of 31 Dec. 2022 by size of employees and by district (Under 10 people)<br>
2306060004 Ngô Phương Anh
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([21.03, 105.85], 10);

// OSM nền
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Hàm màu
function getColor(d) {
    return d > 10000 ? '#800026' :
           d > 7000  ? '#BD0026' :
           d > 5000  ? '#E31A1C' :
           d > 3000  ? '#FC4E2A' :
           d > 1000  ? '#FD8D3C' :
                       '#FEB24C';
}

// Load GeoJSON
fetch('hanoi_districts.geojson')
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {

        pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
                radius: 10,
                fillColor: getColor(feature.properties.value),
                color: "black",
                weight: 1,
                fillOpacity: 0.8
            });
        },

        onEachFeature: function(feature, layer) {

            // Label tên quận
            layer.bindTooltip(feature.properties.name, {
                permanent: true,
                direction: "top"
            });

            // Popup
            layer.bindPopup(
                "<b>" + feature.properties.name + "</b><br>" +
                "Value: " + feature.properties.value
            );
        }

    }).addTo(map);

});

// Legend
var legend = L.control({position: 'topright'});

legend.onAdd = function () {

    var div = L.DomUtil.create('div', 'legend'),
        grades = [0,1000,3000,5000,7000,10000];

    div.innerHTML += "<b>Legend</b><br>";

    for (var i = 0; i < grades.length; i++) {
        div.innerHTML +=
            '<i style="background:' + getColor(grades[i]+1) + '"></i> ' +
            grades[i] + (grades[i+1] ? '&ndash;' + grades[i+1] + '<br>' : '+');
    }

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
